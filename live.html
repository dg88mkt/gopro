<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoPro Video | Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gopro-blue: #00AEEF;
            --bg-black: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle moving gradient background */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .main-card {
            width: 90%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            text-align: center;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header h1 span {
            color: var(--gopro-blue);
        }

        .status-badge {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gopro-blue);
            margin-bottom: 30px;
            display: block;
            opacity: 0.8;
        }

        .video-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .footer-info {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .footer-info strong {
            color: var(--gopro-blue);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <header>
            <h1>GoPro <span>Video</span></h1>
            <span class="status-badge">Professional Preview Engine</span>
        </header>

        <div class="video-container">
            <video controls autoplay muted loop>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="footer-info">
            Currently Previewing: <strong>video.mp4</strong>
        </div>
    </div>

</body>
</html>
